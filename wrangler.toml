name = "my-docuseal"
main = "worker/index.js"
compatibility_date = "2026-05-06"

[vars]
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"
# Optional product IDs from your Creem dashboard (Workers -> Settings -> Variables).
# If omitted, the Worker creates matching one-time Creem products on demand.
# CREEM_PRODUCT_STARTER_MONTHLY = ""
# CREEM_PRODUCT_STARTER_YEARLY = ""
# CREEM_PRODUCT_TEAM_MONTHLY = ""
# CREEM_PRODUCT_TEAM_YEARLY = ""
# CREEM_PRODUCT_SCALE_MONTHLY = ""
# CREEM_PRODUCT_SCALE_YEARLY = ""

# Store one live Creem key as a Worker secret:
# wrangler secret put API_PROD_KEY
# Accepted aliases: CREEM_API_KEY or account Secrets Store binding CREEM_KEY.

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
