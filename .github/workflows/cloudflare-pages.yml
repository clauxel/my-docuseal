# Optional: deploy the same `dist` to Cloudflare Pages (static + /functions redirect).
# Set secret PAGES_PROJECT_NAME to your Pages project id, then run this workflow manually.
name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Pages deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.PAGES_PROJECT_NAME }}
        env:
          WRANGLER_SEND_METRICS: false
